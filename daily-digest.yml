name: Daily LinkedIn Job Digest

on:
  schedule:
    - cron: '0 22 * * *'   # 8:00 AM AEST (UTC+10)
  workflow_dispatch:         # Manual trigger from GitHub UI anytime

jobs:
  job-hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install linkedin-api anthropic python-dotenv requests

      - name: Run job hunter
        env:
          LINKEDIN_LI_AT:     ${{ secrets.LINKEDIN_LI_AT }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
        run: python job_hunter.py
